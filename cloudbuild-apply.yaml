# cloudbuild-apply.yaml — Runs on merge to main (build + deploy)
steps:
  # Build Docker image
  - id: "docker-build"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "northamerica-northeast1-docker.pkg.dev/gcp-app-infra-dev/policing-dashboard/agent-product-studio:$SHORT_SHA"
      - "-t"
      - "northamerica-northeast1-docker.pkg.dev/gcp-app-infra-dev/policing-dashboard/agent-product-studio:latest"
      - "."

  # Push Docker image
  - id: "docker-push"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "northamerica-northeast1-docker.pkg.dev/gcp-app-infra-dev/policing-dashboard/agent-product-studio"
    waitFor: ["docker-build"]

  # Terraform Init
  - id: "tf-init"
    name: "hashicorp/terraform:1.5"
    dir: "terraform"
    entrypoint: "sh"
    args:
      - "-c"
      - "terraform init -no-color"
    waitFor: ["docker-push"]

  # Terraform Apply
  - id: "tf-apply"
    name: "hashicorp/terraform:1.5"
    dir: "terraform"
    entrypoint: "sh"
    args:
      - "-c"
      - "terraform apply -auto-approve -no-color -input=false -var='image_tag=$SHORT_SHA'"
    waitFor: ["tf-init"]

options:
  machineType: "E2_HIGHCPU_8"

images:
  - "northamerica-northeast1-docker.pkg.dev/gcp-app-infra-dev/policing-dashboard/agent-product-studio:$SHORT_SHA"
  - "northamerica-northeast1-docker.pkg.dev/gcp-app-infra-dev/policing-dashboard/agent-product-studio:latest"

timeout: "1200s"
